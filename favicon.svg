<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0891b2"/>
      <stop offset="50%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="bar1" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#6ee7b7"/>
    </linearGradient>
    <linearGradient id="bar2" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#93c5fd"/>
    </linearGradient>
    <linearGradient id="bar3" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#f472b6"/>
      <stop offset="100%" stop-color="#f9a8d4"/>
    </linearGradient>
    <linearGradient id="line" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect x="16" y="16" width="480" height="480" rx="96" ry="96" fill="url(#bg)"/>
  <!-- Inner glow -->
  <rect x="32" y="32" width="448" height="448" rx="80" ry="80" fill="rgba(255,255,255,0.08)"/>
  <!-- Bar chart bars -->
  <rect x="108" y="280" width="60" height="120" rx="8" fill="url(#bar1)" opacity="0.95"/>
  <rect x="226" y="200" width="60" height="200" rx="8" fill="url(#bar2)" opacity="0.95"/>
  <rect x="344" y="240" width="60" height="160" rx="8" fill="url(#bar3)" opacity="0.95"/>
  <!-- Trend line (upward) -->
  <polyline points="128,260 256,170 374,210" fill="none" stroke="url(#line)" stroke-width="14" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Data points on trend line -->
  <circle cx="128" cy="260" r="14" fill="#fbbf24"/>
  <circle cx="256" cy="170" r="14" fill="#fbbf24"/>
  <circle cx="374" cy="210" r="14" fill="#fbbf24"/>
  <!-- Brain/neural icon hint (top-right sparkle) -->
  <circle cx="390" cy="120" r="6" fill="rgba(255,255,255,0.7)"/>
  <circle cx="415" cy="105" r="4" fill="rgba(255,255,255,0.5)"/>
  <circle cx="370" cy="100" r="3" fill="rgba(255,255,255,0.4)"/>
</svg>
